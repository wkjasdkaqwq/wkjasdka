<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semi-rounded Corner - on Liuyanlin Community</title>
    <link rel="icon" href="/wkjasdka/index/echo logo.png" type="image/x-icon">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 基础样式修复 */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .app-launcher-wrapper {
            position: relative;
            display: inline-block;
            padding: 10px;
        }
        .app-launcher-group {
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .app-launcher-btn {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app-launcher-logo img {
            height: 28px;
            width: auto;
        }
        .grid-icon {
            display: grid;
            grid-template-columns: repeat(3, 4px);
            gap: 4px;
        }
        .grid-icon span {
            width: 4px;
            height: 4px;
            background: #555;
            border-radius: 50%;
        }
        .app-launcher-menu {
            position: absolute;
            top: 50px;
            left: 0;
            width: 200px;
            display: none;
            flex-direction: column;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.15);
            padding: 10px;
            z-index: 100;
        }
        .app-launcher-menu a {
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
        }
        .app-launcher-menu a:hover {
            background: #efefef;
        }

        /* 加载层样式 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        #loadingLogo, #loadingTextContainer {
            display: none; /* 初始隐藏，直到下载完成 */
        }
        .loading-logo {
            width: 300px; 
            height: auto;
        }
        .loading-text-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
        }
        .loading-text {
            color: #6a6a6a;
            font-size: 16px;
            margin: 5px 0;
        }

        /* 顶部加载条 */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: #ff8000;
            width: 0%;
            z-index: 10000;
            transition: width 0.1s ease-out;
        }

        #mainContent {
            display: none;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- 顶部加载条 -->
    <div class="top-loading-bar" id="topLoadingBar"></div>
    
    <!-- 加载屏幕 -->
    <div class="loading-screen" id="loadingScreen">
        <!-- 注意：src 留空，由 JS 异步加载 -->
        <img id="loadingLogo" alt="加载Logo" class="loading-logo">
        <div class="loading-text-container" id="loadingTextContainer">
            <div class="loading-text">from</div>
            <div class="loading-text">- Wkjasdka -</div>
        </div>
    </div>

    <!-- 导航栏/九宫格（初始隐藏，属于主内容一部分或在加载后显示） -->
    <div id="mainContent">
        <div class="app-launcher-wrapper">
            <div class="app-launcher-group">
                <button class="app-launcher-btn" id="appLauncherBtn">
                    <div class="grid-icon">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </button>
                <div class="app-launcher-logo">
                    <img src="/wkjasdka/index/community2.png" alt="Logo" />
                </div>
            </div>
            <div class="app-launcher-menu" id="appLauncherMenu">
                <a href="#">Liuyanlin Community</a>
                <a href="#">Liuyanlin Forum</a>
                <a href="#">Liuyanlin Social</a>
            </div>
        </div>
        
        <div style="margin-top: 50px; text-align: center;">
            <h1>欢迎来到社区</h1>
            <p>页面内容已加载完成。</p>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('topLoadingBar');
        const loadingLogo = document.getElementById('loadingLogo');
        const loadingTextContainer = document.getElementById('loadingTextContainer');
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');
        
        const LOGO_URL = '/wkjasdka/index/community2.png';

        // 更新进度条
        function updateProgress(percent) {
            loadingBar.style.width = percent + '%';
        }

        // 1. 异步下载 Logo 并同步进度条
        async function downloadLogo() {
            try {
                const response = await fetch(LOGO_URL);
                if (!response.ok) throw new Error('Logo 无法加载');

                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length');
                
                let receivedLength = 0;
                let chunks = [];

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    
                    if (contentLength) {
                        // Logo 下载进度占总进度的 0% - 80%
                        const progress = (receivedLength / contentLength) * 80;
                        updateProgress(progress);
                    } else {
                        // 如果没有 Content-Length，模拟一个平滑增长
                        let current = parseFloat(loadingBar.style.width) || 0;
                        updateProgress(Math.min(80, current + 2));
                    }
                }

                // 下载完成，转换为 Blob 并显示
                const blob = new Blob(chunks);
                const objectUrl = URL.createObjectURL(blob);
                loadingLogo.src = objectUrl;
                
                // 确保图片完全渲染
                loadingLogo.onload = () => {
                    loadingLogo.style.display = 'block';
                    loadingTextContainer.style.display = 'block';
                    updateProgress(80);
                    // 进入第二阶段：加载页面内容
                    loadPageContent();
                };
            } catch (error) {
                console.error('Logo 下载失败:', error);
                // 容错处理：直接进入下一阶段
                updateProgress(80);
                loadPageContent();
            }
        }

        // 2. 加载页面内容阶段
        function loadPageContent() {
            // 模拟页面内容加载进度从 80% 到 100%
            let progress = 80;
            const interval = setInterval(() => {
                progress += 2;
                updateProgress(progress);
                if (progress >= 100) {
                    clearInterval(interval);
                    finishLoading();
                }
            }, 50);
        }

        // 3. 完成加载
        function finishLoading() {
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                mainContent.style.display = 'block';
                loadingBar.style.display = 'none';
            }, 200); // 稍微停顿让用户看到 100%
        }

        // 九宫格菜单逻辑
        const btn = document.getElementById("appLauncherBtn");
        const menu = document.getElementById("appLauncherMenu");
        if (btn && menu) {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
            });
            document.addEventListener("click", (e) => {
                if (!btn.contains(e.target) && !menu.contains(e.target)) {
                    menu.style.display = "none";
                }
            });
        }

        // 启动加载流程
        window.addEventListener('DOMContentLoaded', () => {
            downloadLogo();
        });
    </script>
</body>
</html>
