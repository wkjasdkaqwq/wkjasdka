<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区 - 启动动画极致优化版</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 顶部加载条 - 还原最初颜色 */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: #ff8000;
            width: 0%;
            z-index: 10001;
            transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        /* 加载屏幕：作为背景遮罩 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            /* 核心：使用 mask 实现透视。初始时不透视。 */
            -webkit-mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
            mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
        }

        /* Logo 容器 */
        #logoContainer {
            display: none;
            z-index: 10000;
            text-align: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loading-logo {
            width: 300px; 
            height: auto;
        }

        .bottom-info {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            transition: opacity 0.6s ease;
        }

        .loading-text {
            color: #6a6a6a;
            font-size: 16px;
            margin: 5px 0;
        }

        /* 主内容 */
        #mainContent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .content-box {
            text-align: center;
            max-width: 800px;
        }

        .visual-blocks {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            width: 100%;
        }

        .block {
            height: 150px;
            background: #f7f7f7;
            border-radius: 15px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="top-loading-bar" id="topLoadingBar"></div>
    
    <div class="loading-screen" id="loadingScreen">
        <div id="logoContainer">
            <img class="loading-logo" src="/wkjasdka/index/community2.png" alt="Logo">
        </div>
        <div class="bottom-info" id="bottomInfo">
            <div class="loading-text">from</div>
            <div class="loading-text">- Wkjasdka -</div>
        </div>
    </div>

    <div id="mainContent">
        <div class="content-box">
            <h1 style="font-size: 3rem; color: #333;">网页内容已就绪</h1>
            <p style="font-size: 1.2rem; color: #666;">
                0.25s 极速摄像机拉远完成。<br>
                注意观察边缘的浅灰色阴影效果。
            </p>
            <div class="visual-blocks">
                <div class="block"></div>
                <div class="block"></div>
                <div class="block"></div>
            </div>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('topLoadingBar');
        const logoContainer = document.getElementById('logoContainer');
        const bottomInfo = document.getElementById('bottomInfo');
        const loadingScreen = document.getElementById('loadingScreen');

        let currentProgress = 0;
        let isFullyLoaded = false;

        function updateProgress(percent) {
            currentProgress = percent;
            loadingBar.style.width = percent + '%';
        }

        function initLoading() {
            let startTimer = setInterval(() => {
                if (currentProgress < 50) {
                    let step = (50 - currentProgress) / 10;
                    updateProgress(currentProgress + Math.max(step, 1));
                } else {
                    clearInterval(startTimer);
                    showLogo();
                }
            }, 50);
        }

        function showLogo() {
            logoContainer.style.display = 'block';
            
            let waitingTimer = setInterval(() => {
                if (isFullyLoaded) {
                    clearInterval(waitingTimer);
                    finishLoadingSequence();
                } else if (currentProgress < 90) {
                    updateProgress(currentProgress + 0.5);
                }
            }, 100);
        }

        function finishLoadingSequence() {
            updateProgress(100);
            
            setTimeout(() => {
                loadingBar.style.opacity = '0';
                
                // 1. Logo 变淡 (稍微加快一点点)
                logoContainer.style.opacity = '0';
                bottomInfo.style.opacity = '0';

                // 2. 0.25s 极速拉远 + 边缘阴影
                setTimeout(startUltraFastReveal, 150);

            }, 400); 
        }

        function startUltraFastReveal() {
            let startTime = null;
            const duration = 2000; // 0.25秒
            const maxRadius = Math.max(window.innerWidth, window.innerHeight) * 1.5;

            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const p = Math.min(elapsed / duration, 1);
                
                // 非线性动画：easeOutQuart (四次减速)
                const easeP = 1 - Math.pow(1 - p, 4);
                const radius = easeP * maxRadius;
                
                // 增加浅灰色阴影：通过 radial-gradient 的多层色阶实现
                // 从透明到浅灰再到纯黑
                const shadowWidth = 160; // 阴影宽度
                const mask = `radial-gradient(circle at center, 
                    transparent ${radius}px, 
                    rgba(0,0,0,0.05) ${radius + shadowWidth * 0.5}px, 
                    rgba(0,0,0,0.15) ${radius + shadowWidth}px, 
                    black ${radius + shadowWidth + 1}px)`;
                
                loadingScreen.style.webkitMaskImage = mask;
                loadingScreen.style.maskImage = mask;

                if (p < 1) {
                    requestAnimationFrame(animate);
                } else {
                    loadingScreen.style.display = 'none';
                    document.body.style.overflow = 'auto';
                }
            }
            
            requestAnimationFrame(animate);
        }

        window.addEventListener('load', () => {
            isFullyLoaded = true;
        });

        initLoading();
    </script>
</body>
</html>
