<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区 - 启动动画最终版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            background-color: #fff;
        }

        /* 顶部加载条 - 还原最初颜色 #ff8000 */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: #ff8000;
            width: 0%;
            z-index: 10000;
            transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        /* 加载屏幕 - 使用 mask-image 实现 Logo 处的透视 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            /* 初始 mask 完全不透明 */
            -webkit-mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
            mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
        }

        #loadingLogo, #loadingTextContainer {
            display: none;
            transition: opacity 0.5s ease;
        }

        .loading-logo {
            width: 300px; 
            height: auto;
        }

        .loading-text-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
        }

        .loading-text {
            color: #6a6a6a;
            font-size: 16px;
            margin: 5px 0;
        }

        /* 主内容 - 摄像机拉远效果 */
        #mainContent {
            display: none;
            padding: 20px;
            opacity: 0;
            transform: scale(4); /* 初始极近，增加视觉张力 */
            transition: transform 1.2s cubic-bezier(0.15, 0.85, 0.35, 1), opacity 1s ease;
            background: #fff;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #mainContent.active {
            opacity: 1;
            transform: scale(1);
        }

        .content-card {
            max-width: 800px;
            margin: 50px auto;
            text-align: center;
            background: #fcfcfc;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
        }
    </style>
</head>
<body>

    <div class="top-loading-bar" id="topLoadingBar"></div>
    
    <div class="loading-screen" id="loadingScreen">
        <img id="loadingLogo" alt="加载Logo" class="loading-logo" src="/wkjasdka/index/community2.png">
        <div class="loading-text-container" id="loadingTextContainer">
            <div class="loading-text">from</div>
            <div class="loading-text">- Wkjasdka -</div>
        </div>
    </div>

    <div id="mainContent">
        <div class="content-card">
            <h1 style="font-size: 2.5rem; color: #333;">欢迎回来</h1>
            <p style="font-size: 1.1rem; color: #666;">刚才您透过 Logo 的窗口看到了这里，网页内容正随着摄像机拉远而展开。</p>
            <div style="margin-top: 40px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;">
                <div style="height: 120px; background: #eee; border-radius: 12px;"></div>
                <div style="height: 120px; background: #eee; border-radius: 12px;"></div>
                <div style="height: 120px; background: #eee; border-radius: 12px;"></div>
            </div>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('topLoadingBar');
        const loadingLogo = document.getElementById('loadingLogo');
        const loadingTextContainer = document.getElementById('loadingTextContainer');
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');

        let currentProgress = 0;
        let isFullyLoaded = false;

        function updateProgress(percent) {
            currentProgress = percent;
            loadingBar.style.width = percent + '%';
        }

        // 还原最初版本的加载逻辑
        function initLoading() {
            let startTimer = setInterval(() => {
                if (currentProgress < 50) {
                    let step = (50 - currentProgress) / 10;
                    updateProgress(currentProgress + Math.max(step, 1));
                } else {
                    clearInterval(startTimer);
                    showLogo();
                }
            }, 50);
        }

        function showLogo() {
            loadingLogo.style.display = 'block';
            loadingTextContainer.style.display = 'block';

            let waitingTimer = setInterval(() => {
                if (isFullyLoaded) {
                    clearInterval(waitingTimer);
                    finishLoadingSequence();
                } else if (currentProgress < 90) {
                    updateProgress(currentProgress + 0.5);
                }
            }, 100);
        }

        function finishLoadingSequence() {
            updateProgress(100);
            
            setTimeout(() => {
                loadingBar.style.opacity = '0';
                
                // 1. 同步开始：主内容在背景下开始拉远
                mainContent.style.display = 'block';
                mainContent.offsetHeight;
                mainContent.classList.add('active');

                // 2. Logo 和文字开始变淡
                loadingLogo.style.opacity = '0';
                loadingTextContainer.style.opacity = '0';

                // 3. 镂空圆圈扩散：Logo 变淡的同时，它所在的区域会“漏”出后面的内容
                let radius = 0;
                const expandMask = () => {
                    radius += (radius + 30) * 0.1; // 调整扩散节奏
                    const mask = `radial-gradient(circle at center, transparent ${radius}px, black ${radius + 1}px)`;
                    loadingScreen.style.webkitMaskImage = mask;
                    loadingScreen.style.maskImage = mask;

                    if (radius < Math.max(window.innerWidth, window.innerHeight) * 1.5) {
                        requestAnimationFrame(expandMask);
                    } else {
                        loadingScreen.style.display = 'none';
                        document.body.style.overflow = 'auto';
                    }
                };
                
                // 关键点：Logo 开始淡出后，立即开始镂空，形成“Logo 融化显现背景”的效果
                setTimeout(expandMask, 50);

            }, 400); 
        }

        window.addEventListener('load', () => {
            isFullyLoaded = true;
        });

        initLoading();
    </script>
</body>
</html>
