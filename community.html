<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semi-rounded Corner - on Liuyanlin Community</title>
    <link rel="icon" href="/wkjasdka/index/echo logo.png" type="image/x-icon">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            background-color: #fff;
        }

        /* 顶部加载条 */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background-color: #ff8000;
            width: 0%;
            z-index: 10001;
            transition: width 0.2s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        /* 加载层 - 改为白色背景 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff; /* 移除橙色，改为白色 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.5s ease;
            transform-origin: center;
        }

        /* Logo 容器 */
        .logo-container {
            display: none;
            text-align: center;
        }

        .loading-logo {
            width: 280px; 
            height: auto;
            transition: filter 0.3s ease;
        }

        .loading-text-container {
            margin-top: 30px;
            color: #6a6a6a; /* 改回深灰色文字 */
            transition: opacity 0.3s ease;
        }

        /* 动画状态类 */
        
        /* 1. 颜色反转 (负片效果) */
        .logo-inverted {
            filter: invert(1) hue-rotate(180deg);
        }

        /* 2. 视口拉近 (放大并穿过) */
        .screen-zoom-in {
            transform: scale(5); /* 极速放大 */
            opacity: 0;
            pointer-events: none;
        }

        /* 主内容进入状态 */
        #mainContent {
            display: none;
            opacity: 0;
            transform: scale(0.9);
            transition: transform 0.8s cubic-bezier(0.1, 0.5, 0.5, 1), opacity 0.6s ease;
            padding: 20px;
        }

        #mainContent.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        /* 九宫格样式保持 */
        .app-launcher-wrapper {
            position: relative;
            display: inline-block;
            padding: 10px;
        }
        .app-launcher-group {
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .app-launcher-btn {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app-launcher-logo img {
            height: 28px;
            width: auto;
        }
        .grid-icon {
            display: grid;
            grid-template-columns: repeat(3, 4px);
            gap: 4px;
        }
        .grid-icon span {
            width: 4px;
            height: 4px;
            background: #555;
            border-radius: 50%;
        }
        .app-launcher-menu {
            position: absolute;
            top: 50px;
            left: 0;
            width: 200px;
            display: none;
            flex-direction: column;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.15);
            padding: 10px;
            z-index: 100;
        }
        .app-launcher-menu a {
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
        }
        .app-launcher-menu a:hover {
            background: #efefef;
        }
    </style>
</head>
<body>

    <!-- 顶部加载条 -->
    <div class="top-loading-bar" id="topLoadingBar"></div>
    
    <!-- 加载屏幕 -->
    <div class="loading-screen" id="loadingScreen">
        <div class="logo-container" id="logoContainer">
            <img id="loadingLogo" alt="加载Logo" class="loading-logo" src="/wkjasdka/index/community2.png">
            <div class="loading-text-container" id="textContainer">
                <div class="loading-text">from</div>
                <div class="loading-text">- Wkjasdka -</div>
            </div>
        </div>
    </div>

    <!-- 主内容 -->
    <div id="mainContent">
        <div class="app-launcher-wrapper">
            <div class="app-launcher-group">
                <button class="app-launcher-btn" id="appLauncherBtn">
                    <div class="grid-icon">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </button>
                <div class="app-launcher-logo">
                    <img src="/wkjasdka/index/community2.png" alt="Logo" />
                </div>
            </div>
            <div class="app-launcher-menu" id="appLauncherMenu">
                <a href="#">Liuyanlin Community</a>
                <a href="#">Liuyanlin Forum</a>
                <a href="#">Liuyanlin Social</a>
            </div>
        </div>
        
        <div style="margin-top: 80px; text-align: center; max-width: 600px; margin-left: auto; margin-right: auto;">
            <h1 style="font-size: 2.5rem; color: #333;">加载完成</h1>
            <p style="font-size: 1.1rem; color: #666; line-height: 1.6;">
                已移除橙色背景。保留了反色闪动与拉近转场效果。
            </p>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('topLoadingBar');
        const logoContainer = document.getElementById('logoContainer');
        const loadingLogo = document.getElementById('loadingLogo');
        const textContainer = document.getElementById('textContainer');
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');

        let currentProgress = 0;
        let isFullyLoaded = false;

        function updateProgress(percent) {
            currentProgress = percent;
            loadingBar.style.width = percent + '%';
        }

        function initLoading() {
            let startTimer = setInterval(() => {
                if (currentProgress < 50) {
                    updateProgress(currentProgress + 2);
                } else {
                    clearInterval(startTimer);
                    showLogoPhase();
                }
            }, 30);
        }

        function showLogoPhase() {
            logoContainer.style.display = 'block';
            
            let waitingTimer = setInterval(() => {
                if (isFullyLoaded) {
                    clearInterval(waitingTimer);
                    startCinematicTransition();
                } else if (currentProgress < 98) {
                    updateProgress(currentProgress + 0.2);
                }
            }, 100);
        }

        function startCinematicTransition() {
            updateProgress(100);

            setTimeout(() => {
                // 1. 反色闪动
                loadingLogo.classList.add('logo-inverted');
                textContainer.style.opacity = '0';
                
                setTimeout(() => {
                    // 2. 视口拉近并变透明
                    loadingScreen.classList.add('screen-zoom-in');
                    loadingBar.style.opacity = '0';
                    
                    // 3. 显示主内容
                    mainContent.style.display = 'block';
                    setTimeout(() => {
                        mainContent.classList.add('active');
                        document.body.style.overflow = 'auto';
                    }, 100);

                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                    }, 600);
                }, 300);
            }, 400);
        }

        window.addEventListener('load', () => {
            isFullyLoaded = true;
        });

        // 九宫格菜单逻辑
        const btn = document.getElementById("appLauncherBtn");
        const menu = document.getElementById("appLauncherMenu");
        if (btn && menu) {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
            });
            document.addEventListener("click", (e) => {
                if (!btn.contains(e.target) && !menu.contains(e.target)) {
                    menu.style.display = "none";
                }
            });
        }

        initLoading();
    </script>
</body>
</html>
