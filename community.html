    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* 加载时禁止滚动 */
        }

        /* 顶部加载条 */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: #ff8000;
            width: 0%;
            z-index: 10000;
            /* 使用更灵敏的过渡，取消 linear 让它看起来更有弹性 */
            transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        /* 加载层样式 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        #loadingLogo, #loadingTextContainer {
            display: none; /* 初始隐藏 */
        }
        .loading-logo {
            width: 300px; 
            height: auto;
        }
        .loading-text-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
        }
        .loading-text {
            color: #6a6a6a;
            font-size: 16px;
            margin: 5px 0;
        }

        #mainContent {
            display: none;
            padding: 20px;
        }

        /* 九宫格样式保持 */
        .app-launcher-wrapper {
            position: relative;
            display: inline-block;
            padding: 10px;
        }
        .app-launcher-group {
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .app-launcher-btn {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app-launcher-logo img {
            height: 28px;
            width: auto;
        }
        .grid-icon {
            display: grid;
            grid-template-columns: repeat(3, 4px);
            gap: 4px;
        }
        .grid-icon span {
            width: 4px;
            height: 4px;
            background: #555;
            border-radius: 50%;
        }
        .app-launcher-menu {
            position: absolute;
            top: 50px;
            left: 0;
            width: 200px;
            display: none;
            flex-direction: column;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.15);
            padding: 10px;
            z-index: 100;
        }
        .app-launcher-menu a {
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
        }
        .app-launcher-menu a:hover {
            background: #efefef;
        }
    </style>
</head>
<body>

    <!-- 顶部加载条 -->
    <div class="top-loading-bar" id="topLoadingBar"></div>
    
    <!-- 加载屏幕 -->
    <div class="loading-screen" id="loadingScreen">
        <img id="loadingLogo" alt="加载Logo" class="loading-logo" src="/wkjasdka/index/community2.png">
        <div class="loading-text-container" id="loadingTextContainer">
            <div class="loading-text">from</div>
            <div class="loading-text">- Wkjasdka -</div>
        </div>
    </div>

    <!-- 主内容 -->
    <div id="mainContent">
        <div class="app-launcher-wrapper">
            <div class="app-launcher-group">
                <button class="app-launcher-btn" id="appLauncherBtn">
                    <div class="grid-icon">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </button>
                <div class="app-launcher-logo">
                    <img src="/wkjasdka/index/community2.png" alt="Logo" />
                </div>
            </div>
            <div class="app-launcher-menu" id="appLauncherMenu">
                <a href="#">Liuyanlin Community</a>
                <a href="#">Liuyanlin Forum</a>
                <a href="#">Liuyanlin Social</a>
            </div>
        </div>
        
        <div style="margin-top: 50px; text-align: center;">
            <h1>欢迎来到社区</h1>
            <p>页面内容已加载完成。</p>
            <p>这是一个演示页面，所有的资源都已成功同步加载。</p>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('topLoadingBar');
        const loadingLogo = document.getElementById('loadingLogo');
        const loadingTextContainer = document.getElementById('loadingTextContainer');
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');

        let currentProgress = 0;
        let isFullyLoaded = false;

        function updateProgress(percent) {
            currentProgress = percent;
            loadingBar.style.width = percent + '%';
        }

        // 核心加载逻辑
        function initLoading() {
            // 第一阶段：快速启动到 50%
            let startTimer = setInterval(() => {
                if (currentProgress < 50) {
                    // 递增速度逐渐减慢，模拟真实感
                    let step = (50 - currentProgress) / 10;
                    updateProgress(currentProgress + Math.max(step, 1));
                } else {
                    clearInterval(startTimer);
                    showLogo();
                }
            }, 50);
        }

        function showLogo() {
            // 显示 Logo
            loadingLogo.style.display = 'block';
            loadingTextContainer.style.display = 'block';

            // 第二阶段：进入内容等待阶段，缓慢爬升到 90%
            // 这是一个“防卡死”进度，让用户觉得一直在加载
            let waitingTimer = setInterval(() => {
                if (isFullyLoaded) {
                    clearInterval(waitingTimer);
                    finishLoadingSequence();
                } else if (currentProgress < 90) {
                    updateProgress(currentProgress + 0.5);
                }
            }, 100);
        }

        function finishLoadingSequence() {
            // 第三阶段：快速填满并消失
            updateProgress(100);
            
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                loadingScreen.style.transition = 'opacity 0.4s ease';
                
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    mainContent.style.display = 'block';
                    loadingBar.style.display = 'none';
                    document.body.style.overflow = 'auto'; // 恢复滚动
                }, 400);
            }, 300); // 让用户看清 100%
        }

        // 监听网页真实加载状态
        window.addEventListener('load', () => {
            isFullyLoaded = true;
            // 如果此时进度还没到 50%（比如网速极快），逻辑也会在 initLoading 完成后自动触发 finishLoadingSequence
        });

        // 九宫格菜单逻辑
        const btn = document.getElementById("appLauncherBtn");
        const menu = document.getElementById("appLauncherMenu");
        if (btn && menu) {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
            });
            document.addEventListener("click", (e) => {
                if (!btn.contains(e.target) && !menu.contains(e.target)) {
                    menu.style.display = "none";
                }
            });
        }

        // 启动
        initLoading();
    </script>
</body>
