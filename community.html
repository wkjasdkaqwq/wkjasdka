<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semi-rounded Corner - on Liuyanlin Community</title>
    <link rel="icon" href="/wkjasdka/index/echo logo.png" type="image/x-icon">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            background-color: #fff;
        }

        /* 顶部加载条 */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background-color: #ff8000;
            width: 0%;
            z-index: 10001;
            transition: width 0.2s cubic-bezier(0.1, 0.5, 0.5, 1);
            box-shadow: 0 0 10px rgba(255, 128, 0, 0.5);
        }

        /* 加载层样式 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            transform-origin: center;
            transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.4s ease;
        }

        /* Logo 容器 - 用于执行 Angry Birds 风格的弹跳 */
        .logo-container {
            display: none; /* 初始隐藏 */
            text-align: center;
            transform: scale(0.8);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }

        .logo-container.show {
            display: block;
            transform: scale(1);
            opacity: 1;
        }

        /* Logo 弹动动画类 */
        .logo-bounce {
            animation: angry-bounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes angry-bounce {
            0% { transform: scale(1); }
            30% { transform: scale(1.2) rotate(-3deg); }
            60% { transform: scale(0.9) rotate(3deg); }
            100% { transform: scale(1); }
        }

        .loading-logo {
            width: 280px; 
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .loading-text-container {
            margin-top: 30px;
        }

        .loading-text {
            color: #6a6a6a;
            font-size: 16px;
            margin: 5px 0;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* 主内容进入动画 */
        #mainContent {
            display: none;
            opacity: 0;
            transform: scale(1.1);
            transition: transform 0.7s cubic-bezier(0.1, 0.5, 0.5, 1), opacity 0.5s ease;
            padding: 20px;
        }

        #mainContent.active {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        /* 揭幕遮罩效果 (Angry Birds 2 风格的圆形扩散) */
        .iris-out {
            clip-path: circle(0% at 50% 50%);
            transition: clip-path 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }

        /* 九宫格样式保持 */
        .app-launcher-wrapper {
            position: relative;
            display: inline-block;
            padding: 10px;
        }
        .app-launcher-group {
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .app-launcher-btn {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app-launcher-logo img {
            height: 28px;
            width: auto;
        }
        .grid-icon {
            display: grid;
            grid-template-columns: repeat(3, 4px);
            gap: 4px;
        }
        .grid-icon span {
            width: 4px;
            height: 4px;
            background: #555;
            border-radius: 50%;
        }
        .app-launcher-menu {
            position: absolute;
            top: 50px;
            left: 0;
            width: 200px;
            display: none;
            flex-direction: column;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.15);
            padding: 10px;
            z-index: 100;
        }
        .app-launcher-menu a {
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
        }
        .app-launcher-menu a:hover {
            background: #efefef;
        }
    </style>
</head>
<body>

    <!-- 顶部加载条 -->
    <div class="top-loading-bar" id="topLoadingBar"></div>
    
    <!-- 加载屏幕 -->
    <div class="loading-screen" id="loadingScreen">
        <div class="logo-container" id="logoContainer">
            <img id="loadingLogo" alt="加载Logo" class="loading-logo" src="/wkjasdka/index/community2.png">
            <div class="loading-text-container">
                <div class="loading-text">from</div>
                <div class="loading-text">- Wkjasdka -</div>
            </div>
        </div>
    </div>

    <!-- 主内容 -->
    <div id="mainContent">
        <div class="app-launcher-wrapper">
            <div class="app-launcher-group">
                <button class="app-launcher-btn" id="appLauncherBtn">
                    <div class="grid-icon">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </button>
                <div class="app-launcher-logo">
                    <img src="/wkjasdka/index/community2.png" alt="Logo" />
                </div>
            </div>
            <div class="app-launcher-menu" id="appLauncherMenu">
                <a href="#">Liuyanlin Community</a>
                <a href="#">Liuyanlin Forum</a>
                <a href="#">Liuyanlin Social</a>
            </div>
        </div>
        
        <div style="margin-top: 80px; text-align: center; max-width: 600px; margin-left: auto; margin-right: auto;">
            <h1 style="font-size: 2.5rem; color: #333;">欢迎来到社区</h1>
            <p style="font-size: 1.1rem; color: #666; line-height: 1.6;">
                我们参考了《愤怒的小鸟2》的转场风格，为您打造了动感十足的进入动画。
                进度条填满后，Logo 会有一个俏皮的弹动，随后页面会以缩放揭幕的方式展现。
            </p>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('topLoadingBar');
        const logoContainer = document.getElementById('logoContainer');
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');

        let currentProgress = 0;
        let isFullyLoaded = false;

        function updateProgress(percent) {
            currentProgress = percent;
            loadingBar.style.width = percent + '%';
        }

        // 1. 启动加载流程
        function initLoading() {
            let startTimer = setInterval(() => {
                if (currentProgress < 50) {
                    let step = (50 - currentProgress) / 8;
                    updateProgress(currentProgress + Math.max(step, 1.5));
                } else {
                    clearInterval(startTimer);
                    triggerLogoPhase();
                }
            }, 40);
        }

        // 2. Logo 出现阶段
        function triggerLogoPhase() {
            logoContainer.classList.add('show');
            
            // 缓慢爬升进度
            let waitingTimer = setInterval(() => {
                if (isFullyLoaded) {
                    clearInterval(waitingTimer);
                    startFinishSequence();
                } else if (currentProgress < 95) {
                    updateProgress(currentProgress + 0.3);
                }
            }, 80);
        }

        // 3. 收尾冲刺与 Angry Birds 风格动画
        function startFinishSequence() {
            // 快速冲到 100%
            updateProgress(100);

            setTimeout(() => {
                // Logo 弹一下
                logoContainer.classList.add('logo-bounce');
                
                setTimeout(() => {
                    // 执行转场
                    executeAngryBirdsTransition();
                }, 400);
            }, 300);
        }

        function executeAngryBirdsTransition() {
            // 隐藏进度条
            loadingBar.style.opacity = '0';
            
            // 加载屏幕缩小并消失 (Angry Birds 2 风格)
            loadingScreen.style.transform = 'scale(1.5)';
            loadingScreen.style.opacity = '0';
            
            // 主内容从 1.1 缩回到 1.0 展现
            mainContent.style.display = 'block';
            setTimeout(() => {
                mainContent.classList.add('active');
                document.body.style.overflow = 'auto';
            }, 50);

            setTimeout(() => {
                loadingScreen.style.display = 'none';
                loadingBar.style.display = 'none';
            }, 700);
        }

        // 监听网页真实加载状态
        window.addEventListener('load', () => {
            isFullyLoaded = true;
        });

        // 九宫格菜单逻辑
        const btn = document.getElementById("appLauncherBtn");
        const menu = document.getElementById("appLauncherMenu");
        if (btn && menu) {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
            });
            document.addEventListener("click", (e) => {
                if (!btn.contains(e.target) && !menu.contains(e.target)) {
                    menu.style.display = "none";
                }
            });
        }

        initLoading();
    </script>
</body>
</html>
