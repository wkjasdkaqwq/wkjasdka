<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区 - 摄像机拉远最终版</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 顶部加载条 - 还原最初颜色 */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: #ff8000;
            width: 0%;
            z-index: 10001;
            transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        /* 加载屏幕：作为遮罩层实现摄像机效果 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            /* 初始 mask 不透明 */
            -webkit-mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
            mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
        }

        #loadingLogo, #loadingTextContainer {
            display: none;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1); /* 缓慢淡出 */
        }

        .loading-logo {
            width: 300px; 
            height: auto;
        }

        .loading-text-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
        }

        .loading-text {
            color: #6a6a6a;
            font-size: 16px;
            margin: 5px 0;
        }

        /* 主网页内容 - 保持完全静止 */
        #mainContent {
            display: block; 
            padding: 40px;
            box-sizing: border-box;
            background: #fff;
            min-height: 100vh;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .content-card {
            max-width: 900px;
            margin: 40px auto;
            text-align: center;
            background: #ffffff;
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }

        .visual-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 50px;
        }
        .visual-item {
            height: 200px;
            background: linear-gradient(135deg, #f5f5f5 0%, #eeeeee 100%);
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="top-loading-bar" id="topLoadingBar"></div>
    
    <div class="loading-screen" id="loadingScreen">
        <img id="loadingLogo" alt="加载Logo" class="loading-logo" src="/wkjasdka/index/community2.png">
        <div class="loading-text-container" id="loadingTextContainer">
            <div class="loading-text">from</div>
            <div class="loading-text">- Wkjasdka -</div>
        </div>
    </div>

    <div id="mainContent">
        <div class="content-card">
            <h1 style="font-size: 3.5rem; color: #222; margin-bottom: 20px; font-weight: 800;">社区全景已展现</h1>
            <p style="font-size: 1.3rem; color: #888; max-width: 600px; margin: 0 auto;">
                Logo 消失后，遮罩层像摄像机镜头一样拉开。<br>
                网页内容始终保持静止，仅视角在后退。
            </p>
            <div class="visual-grid">
                <div class="visual-item"></div>
                <div class="visual-item"></div>
                <div class="visual-item"></div>
            </div>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('topLoadingBar');
        const loadingLogo = document.getElementById('loadingLogo');
        const loadingTextContainer = document.getElementById('loadingTextContainer');
        const loadingScreen = document.getElementById('loadingScreen');

        let currentProgress = 0;
        let isFullyLoaded = false;

        function updateProgress(percent) {
            currentProgress = percent;
            loadingBar.style.width = percent + '%';
        }

        // 还原最初版本的加载逻辑
        function initLoading() {
            let startTimer = setInterval(() => {
                if (currentProgress < 50) {
                    let step = (50 - currentProgress) / 10;
                    updateProgress(currentProgress + Math.max(step, 1));
                } else {
                    clearInterval(startTimer);
                    showLogo();
                }
            }, 50);
        }

        function showLogo() {
            loadingLogo.style.display = 'block';
            loadingTextContainer.style.display = 'block';

            let waitingTimer = setInterval(() => {
                if (isFullyLoaded) {
                    clearInterval(waitingTimer);
                    finishLoadingSequence();
                } else if (currentProgress < 90) {
                    updateProgress(currentProgress + 0.5);
                }
            }, 100);
        }

        function finishLoadingSequence() {
            updateProgress(100);
            
            setTimeout(() => {
                loadingBar.style.opacity = '0';
                
                // 第一阶段：Logo 慢慢消失 (1.5秒)
                loadingLogo.style.opacity = '0';
                loadingTextContainer.style.opacity = '0';

                // 第二阶段：在 Logo 消失过程中（或稍后）启动摄像机拉远
                setTimeout(() => {
                    startCameraZoomOut();
                }, 800); // 在 Logo 还没完全变透明时就开始拉远，衔接更自然

            }, 400); 
        }

        function startCameraZoomOut() {
            let radius = 0;
            const maxRadius = Math.max(window.innerWidth, window.innerHeight) * 1.5;
            let startTime = null;
            const zoomDuration = 1200; // 拉远动画持续 1.2 秒

            function animateZoom(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / zoomDuration, 1);
                
                // 使用 easeInExpo 增加拉远的爆发感
                const ease = progress === 0 ? 0 : Math.pow(2, 10 * progress - 10);
                radius = ease * maxRadius;
                
                const mask = `radial-gradient(circle at center, transparent ${radius}px, black ${radius + 1}px)`;
                loadingScreen.style.webkitMaskImage = mask;
                loadingScreen.style.maskImage = mask;

                if (progress < 1) {
                    requestAnimationFrame(animateZoom);
                } else {
                    loadingScreen.style.display = 'none';
                    document.body.style.overflow = 'auto';
                }
            }
            
            requestAnimationFrame(animateZoom);
        }

        window.addEventListener('load', () => {
            isFullyLoaded = true;
        });

        initLoading();
    </script>
</body>
</html>
