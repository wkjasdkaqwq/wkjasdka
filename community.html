<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semi-rounded Corner - on Liuyanlin Community</title>
    <link rel="icon" href="/wkjasdka/index/echo logo.png" type="image/x-icon">
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 顶部加载条 */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: #ff8000;
            width: 0%;
            z-index: 10000;
            transition: width 0.2s ease-out;
        }

        /* 加载层样式 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        #loadingLogo, #loadingTextContainer {
            display: none; /* 初始隐藏 */
        }
        .loading-logo {
            width: 300px; 
            height: auto;
        }
        .loading-text-container {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
        }
        .loading-text {
            color: #6a6a6a;
            font-size: 16px;
            margin: 5px 0;
        }

        #mainContent {
            display: none;
            padding: 20px;
        }

        /* 九宫格样式保持 */
        .app-launcher-wrapper {
            position: relative;
            display: inline-block;
            padding: 10px;
        }
        .app-launcher-group {
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .app-launcher-btn {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app-launcher-logo img {
            height: 28px;
            width: auto;
        }
        .grid-icon {
            display: grid;
            grid-template-columns: repeat(3, 4px);
            gap: 4px;
        }
        .grid-icon span {
            width: 4px;
            height: 4px;
            background: #555;
            border-radius: 50%;
        }
        .app-launcher-menu {
            position: absolute;
            top: 50px;
            left: 0;
            width: 200px;
            display: none;
            flex-direction: column;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.15);
            padding: 10px;
            z-index: 100;
        }
        .app-launcher-menu a {
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            color: #333;
        }
        .app-launcher-menu a:hover {
            background: #efefef;
        }
    </style>
</head>
<body>

    <!-- 顶部加载条 -->
    <div class="top-loading-bar" id="topLoadingBar"></div>
    
    <!-- 加载屏幕 -->
    <div class="loading-screen" id="loadingScreen">
        <img id="loadingLogo" alt="加载Logo" class="loading-logo" src="/wkjasdka/index/community2.png">
        <div class="loading-text-container" id="loadingTextContainer">
            <div class="loading-text">from</div>
            <div class="loading-text">- Wkjasdka -</div>
        </div>
    </div>

    <!-- 主内容 -->
    <div id="mainContent">
        <div class="app-launcher-wrapper">
            <div class="app-launcher-group">
                <button class="app-launcher-btn" id="appLauncherBtn">
                    <div class="grid-icon">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </button>
                <div class="app-launcher-logo">
                    <img src="/wkjasdka/index/community2.png" alt="Logo" />
                </div>
            </div>
            <div class="app-launcher-menu" id="appLauncherMenu">
                <a href="#">Liuyanlin Community</a>
                <a href="#">Liuyanlin Forum</a>
                <a href="#">Liuyanlin Social</a>
            </div>
        </div>
        
        <div style="margin-top: 50px; text-align: center;">
            <h1>欢迎来到社区</h1>
            <p>页面内容已加载完成。</p>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('topLoadingBar');
        const loadingLogo = document.getElementById('loadingLogo');
        const loadingTextContainer = document.getElementById('loadingTextContainer');
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');

        let currentProgress = 0;

        function updateProgress(percent) {
            currentProgress = percent;
            loadingBar.style.width = percent + '%';
        }

        // 核心加载逻辑
        function startLoadingSequence() {
            // 1. 进度条先行：从 0% 增长到 50%
            let stage1Interval = setInterval(() => {
                if (currentProgress < 50) {
                    updateProgress(currentProgress + 2);
                } else {
                    clearInterval(stage1Interval);
                    showLogoAndContinue();
                }
            }, 30);
        }

        function showLogoAndContinue() {
            // 2. 进度到 50% 时，显示 Logo 和底部文字
            loadingLogo.style.display = 'block';
            loadingTextContainer.style.display = 'block';

            // 3. 继续增加进度到 100%（模拟后续网页内容加载）
            let stage2Interval = setInterval(() => {
                if (currentProgress < 100) {
                    updateProgress(currentProgress + 2);
                } else {
                    clearInterval(stage2Interval);
                    finishLoading();
                }
            }, 30);
        }

        function finishLoading() {
            // 4. 加载完成，移除加载层
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                mainContent.style.display = 'block';
                loadingBar.style.display = 'none';
            }, 300);
        }

        // 九宫格菜单逻辑
        const btn = document.getElementById("appLauncherBtn");
        const menu = document.getElementById("appLauncherMenu");
        if (btn && menu) {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
            });
            document.addEventListener("click", (e) => {
                if (!btn.contains(e.target) && !menu.contains(e.target)) {
                    menu.style.display = "none";
                }
            });
        }

        // 页面进入即刻开始
        window.addEventListener('DOMContentLoaded', () => {
            startLoadingSequence();
        });
    </script>
</body>
</html>
