<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区 - 启动动画完美透视版</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 顶部加载条 - 还原最初颜色 #ff8000 */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: #ff8000;
            width: 0%;
            z-index: 10001;
            transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        /* 加载屏幕：作为背景遮罩 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            /* 关键：使用 mask 实现透视。初始时不透视。 */
            -webkit-mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
            mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
        }

        /* Logo 容器：它的透明度变化会直接露出下方的 mainContent，因为我们会同步开启镂空 */
        #logoContainer {
            display: none;
            z-index: 10000;
            text-align: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loading-logo {
            width: 300px; 
            height: auto;
        }

        .bottom-info {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            transition: opacity 1s ease;
        }

        .loading-text {
            color: #6a6a6a;
            font-size: 16px;
            margin: 5px 0;
        }

        /* 主内容：它始终在最底层，等待被透出来 */
        #mainContent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .content-box {
            text-align: center;
            max-width: 800px;
        }

        .placeholder-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
            width: 100%;
        }

        .placeholder-item {
            height: 150px;
            background: #f5f5f5;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="top-loading-bar" id="topLoadingBar"></div>
    
    <div class="loading-screen" id="loadingScreen">
        <div id="logoContainer">
            <img class="loading-logo" src="/wkjasdka/index/community2.png" alt="Logo">
        </div>
        <div class="bottom-info" id="bottomInfo">
            <div class="loading-text">from</div>
            <div class="loading-text">- Wkjasdka -</div>
        </div>
    </div>

    <div id="mainContent">
        <div class="content-box">
            <h1 style="font-size: 3rem; color: #333;">测试</h1>
            <p style="font-size: 1.2rem; color: #666;">
                <br>
                这是一个 Community 前端页面测试
            </p>
            <div class="placeholder-grid">
                <div class="placeholder-item"></div>
                <div class="placeholder-item"></div>
                <div class="placeholder-item"></div>
            </div>
        </div>
    </div>

    <script>
        const loadingBar = document.getElementById('topLoadingBar');
        const logoContainer = document.getElementById('logoContainer');
        const bottomInfo = document.getElementById('bottomInfo');
        const loadingScreen = document.getElementById('loadingScreen');

        let currentProgress = 0;
        let isFullyLoaded = false;

        function updateProgress(percent) {
            currentProgress = percent;
            loadingBar.style.width = percent + '%';
        }

        // 还原最初版本的加载逻辑
        function initLoading() {
            let startTimer = setInterval(() => {
                if (currentProgress < 50) {
                    let step = (50 - currentProgress) / 10;
                    updateProgress(currentProgress + Math.max(step, 1));
                } else {
                    clearInterval(startTimer);
                    showLogo();
                }
            }, 50);
        }

        function showLogo() {
            logoContainer.style.display = 'block';
            
            let waitingTimer = setInterval(() => {
                if (isFullyLoaded) {
                    clearInterval(waitingTimer);
                    finishLoadingSequence();
                } else if (currentProgress < 90) {
                    updateProgress(currentProgress + 0.5);
                }
            }, 100);
        }

        function finishLoadingSequence() {
            updateProgress(100);
            
            setTimeout(() => {
                loadingBar.style.opacity = '0';
                
                // 1. 让 Logo 和文字开始变淡
                logoContainer.style.opacity = '0';
                bottomInfo.style.opacity = '0';

                // 2. 核心：在 Logo 变淡的同时，立即开启一个镂空窗口
                // 这样当 Logo 变半透明时，露出的不是白色背景，而是后面的内容
                startPerfectReveal();

            }, 400); 
        }

        function startPerfectReveal() {
            let radius = 0;
            const maxRadius = Math.max(window.innerWidth, window.innerHeight) * 1.5;
            
            // 初始镂空范围，确保 Logo 变淡时立即能看到背景
            radius = 10; 

            function animate() {
                // 模拟摄像机平滑拉远
                radius += (radius + 25) * 0.08; 
                
                const mask = `radial-gradient(circle at center, transparent ${radius}px, black ${radius + 1}px)`;
                loadingScreen.style.webkitMaskImage = mask;
                loadingScreen.style.maskImage = mask;

                if (radius < maxRadius) {
                    requestAnimationFrame(animate);
                } else {
                    loadingScreen.style.display = 'none';
                    document.body.style.overflow = 'auto';
                }
            }
            
            requestAnimationFrame(animate);
        }

        window.addEventListener('load', () => {
            isFullyLoaded = true;
        });

        initLoading();
    </script>
</body>
</html>
