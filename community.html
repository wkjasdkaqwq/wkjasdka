<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区 - 启动动画</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 顶部加载条 */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background-color: #ff8000;
            width: 0%;
            z-index: 10001;
            transition: width 0.3s ease;
        }

        /* 加载屏幕容器 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 关键：使用 mask-image 实现镂空 */
            -webkit-mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
            mask-image: radial-gradient(circle at center, transparent 0%, black 0%);
            -webkit-mask-size: 100% 100%;
            mask-size: 100% 100%;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
        }

        .logo-container {
            text-align: center;
            transition: opacity 0.4s ease;
        }

        .loading-logo {
            width: 280px;
            height: auto;
            margin-bottom: 20px;
        }

        .bottom-text {
            position: absolute;
            bottom: 50px;
            text-align: center;
            color: #888;
            font-size: 14px;
            transition: opacity 0.4s ease;
        }

        /* 主内容：摄像机拉远效果 */
        #mainContent {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transform: scale(2.5); /* 初始极近 */
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s ease-out;
            padding: 40px;
            box-sizing: border-box;
            background: #fff;
            overflow-y: auto;
        }

        #mainContent.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1); /* 拉远到正常 */
        }

        /* 内容装饰 */
        .content-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 九宫格按钮 */
        .launcher-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: none;
            cursor: pointer;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        .launcher-btn span {
            background: #333;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="top-loading-bar" id="loadingBar"></div>

    <div class="loading-screen" id="loadingScreen">
        <div class="logo-container" id="logoContainer">
            <img src="/wkjasdka/index/community2.png" alt="Logo" class="loading-logo">
        </div>
        <div class="bottom-text" id="bottomText">
            <div>from</div>
            <div style="font-weight: bold; margin-top: 5px;">- WKJASDKA -</div>
        </div>
    </div>

    <div id="mainContent">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 40px;">
            <button class="launcher-btn">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </button>
            <img src="/wkjasdka/index/community2.png" alt="Logo" style="height: 30px;">
        </div>

        <div class="content-card">
            <h1 style="margin-top: 0;">探索新社区</h1>
            <p>内容已通过镂空动画完美呈现。这种效果模拟了《愤怒的小鸟2》的启动体验，结合了 Logo 区域的透视和摄像机的拉远感。</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="content-card" style="height: 200px;"></div>
            <div class="content-card" style="height: 200px;"></div>
        </div>
    </div>

    <script>
        const bar = document.getElementById('loadingBar');
        const screen = document.getElementById('loadingScreen');
        const logo = document.getElementById('logoContainer');
        const bottom = document.getElementById('bottomText');
        const main = document.getElementById('mainContent');

        let progress = 0;
        let loaded = false;

        // 模拟加载进度
        const timer = setInterval(() => {
            if (progress < 90) {
                progress += loaded ? 5 : 0.8;
                bar.style.width = progress + '%';
            } else if (loaded) {
                clearInterval(timer);
                startExitAnimation();
            }
        }, 30);

        window.onload = () => { loaded = true; };

        function startExitAnimation() {
            bar.style.width = '100%';
            
            setTimeout(() => {
                bar.style.opacity = '0';
                
                // 1. 开始主内容拉远动画（在背景后面先动起来）
                main.classList.add('active');

                // 2. Logo 和底部文字变淡，露出后面的内容（通过镂空）
                logo.style.opacity = '0';
                bottom.style.opacity = '0';

                // 3. 镂空扩散动画
                let radius = 0;
                const expand = () => {
                    radius += (radius + 20) * 0.15; // 加速扩散
                    const mask = `radial-gradient(circle at center, transparent ${radius}px, black ${radius + 1}px)`;
                    screen.style.webkitMaskImage = mask;
                    screen.style.maskImage = mask;

                    if (radius < Math.max(window.innerWidth, window.innerHeight) * 1.5) {
                        requestAnimationFrame(expand);
                    } else {
                        screen.style.display = 'none';
                        document.body.style.overflow = 'auto';
                    }
                };
                
                // 稍微延迟一下镂空，让用户先感觉到 Logo 变透明
                setTimeout(expand, 200);

            }, 400);
        }
    </script>
</body>
</html>
